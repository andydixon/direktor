; Direktor - production layout rooted in /etc/direktor
; Main configuration file loaded by the systemd unit.

[direktord]
logfile = /var/log/direktor/direktord.log
loglevel = info
pidfile = /run/direktor/direktord.pid
nodaemon = true
minfds = 1024
minprocs = 200
identifier = direktor
socket_path = /run/direktor/direktor.sock
socket_mode = 0770
http_host = 127.0.0.1
http_port = 9876
; http_auth = token
; http_auth_token = changeme

[include]
files = /etc/direktor/conf.d/*.conf
